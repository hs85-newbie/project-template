name: CI 품질 게이트

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: TypeScript 타입 체크
        run: pnpm tsc --noEmit

      - name: ESLint
        run: pnpm lint

      - name: 빌드
        run: pnpm build

      - name: 테스트 실행
        run: pnpm test --coverage

      - name: 커버리지 80% 체크
        run: pnpm coverage-check

      - name: npm audit (알려진 취약점)
        run: pnpm audit --audit-level=high

      - name: 커버리지 댓글
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
