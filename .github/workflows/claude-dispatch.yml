name: Claude Code (수동 실행)

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Claude에게 시킬 작업"
        required: true
        type: string
      max_turns:
        description: "최대 실행 횟수 (기본: 20)"
        default: "20"
        type: string
  repository_dispatch:
    types: [claude-task, claude-approve]

jobs:
  # ── 작업 실행 (claude-task) ──
  execute:
    if: github.event_name != 'repository_dispatch' || github.event.client_payload.action != 'approve'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.branch || 'main' }}
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: hs85-newbie/my-claude-global
          path: .claude-global
          token: ${{ secrets.GLOBAL_SETTINGS_TOKEN }}
      - run: |
          mkdir -p ~/.claude/skills
          cp .claude-global/CLAUDE.md ~/.claude/CLAUDE.md
          cp -r .claude-global/skills/* ~/.claude/skills/ 2>/dev/null || true
      - name: Bun 설치
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/gstack
          key: gstack-v1-${{ runner.os }}
      - name: gstack 설치 (캐시 미스 시)
        run: |
          if [ ! -f ~/gstack/setup ]; then
            git clone https://github.com/garrytan/gstack.git ~/gstack
          fi
          cd ~/gstack && ./setup --host claude

      - name: Claude Code 실행
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          prompt: |
            작업: ${{ inputs.task || github.event.client_payload.task }}

            컨텍스트:
            - docs/ANALYSIS-*.md 파일이 있으면 먼저 읽고 이전 분석 내용을 참조하세요.
            - 이슈 ID: ${{ github.event.client_payload.issue_id || 'manual' }}

            작업 유형 판단:
            - 작업 내용에 "점검", "분석", "제안", "검토"가 포함되면 → 분석 작업
            - 그 외 → 코드 수정 작업

            [분석 작업인 경우]
            - 프로젝트를 분석하고 결과를 docs/ANALYSIS-${{ github.event.client_payload.issue_id || 'manual' }}.md 파일로 작성하세요.
            - 파일 구성: 현황 요약, 발견 이슈 목록 (번호 매기기), 개선 제안, 우선순위
            - 각 이슈 항목은 후속 Paperclip 이슈로 생성할 수 있도록 구체적으로 작성하세요.
            - 코드 수정은 하지 마세요. 분석 파일만 생성하세요.

            [코드 수정 작업인 경우]
            - docs/ANALYSIS-*.md 파일이 있으면 참조하여 컨텍스트를 파악하세요.
            - 작업 설명에 특정 항목이 지정되어 있으면 해당 항목만 수정하세요.
            - 항목 지정이 없으면 ANALYSIS의 가장 우선순위 높은 1개 항목만 수정하세요.
            - 여러 항목을 한 번에 수정하지 마세요.

            완료 후 실행:
              git checkout -b claude/${{ github.event.client_payload.issue_id || 'manual' }}
              git add -A
              git commit -m "작업 내용 요약 (한국어)"
              git push origin claude/${{ github.event.client_payload.issue_id || 'manual' }}
            - 대상 브랜치: ${{ github.event.client_payload.branch || 'main' }}
            - PR은 생성하지 마세요.
          claude_args: "--max-turns ${{ inputs.max_turns || github.event.client_payload.max_turns || '30' }} --dangerously-skip-permissions"

      # 수정 내용 보고서를 Paperclip에 코멘트로 남김
      - name: Paperclip 보고 + 분석 작업 자동 머지
        if: always() && github.event_name == 'repository_dispatch'
        env:
          PAPERCLIP_URL: https://paperclip-production-7ed4.up.railway.app
          PAPERCLIP_API_KEY: ${{ secrets.PAPERCLIP_API_KEY }}
          ISSUE_UUID: ${{ github.event.client_payload.issue_uuid }}
          ISSUE_ID: ${{ github.event.client_payload.issue_id }}
          TASK: ${{ github.event.client_payload.task }}
          BRANCH: ${{ github.event.client_payload.branch || 'main' }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_TOKEN: ${{ secrets.GLOBAL_SETTINGS_TOKEN }}
        run: |
          WORK_BRANCH="claude/${ISSUE_ID}"

          # 분석 작업 여부 판단 (제목만 검사 — 설명에 키워드 있어도 코드수정으로 처리)
          TITLE_ONLY=$(echo "$TASK" | sed 's/\. 상세:.*$//')
          IS_ANALYSIS=false
          echo "$TITLE_ONLY" | grep -qE "점검|분석|제안|검토" && IS_ANALYSIS=true

          if [ "$JOB_STATUS" = "success" ]; then
            git fetch origin 2>/dev/null || true
            DIFF_STAT=$(git diff --stat "origin/${BRANCH}...origin/${WORK_BRANCH}" 2>/dev/null || echo "diff 확인 불가")
            CHANGED_FILES=$(git diff --name-only "origin/${BRANCH}...origin/${WORK_BRANCH}" 2>/dev/null | head -20 || echo "")
            COMMIT_LOG=$(git log --oneline "origin/${BRANCH}..origin/${WORK_BRANCH}" 2>/dev/null | head -10 || echo "")

            if [ "$IS_ANALYSIS" = true ]; then
              # 분석 작업 → 자동 PR 생성 + 머지 + done
              PR_URL=$(gh pr create \
                --base "$BRANCH" \
                --head "$WORK_BRANCH" \
                --title "[${ISSUE_ID}] 분석 보고서" \
                --body "분석 결과 docs/ANALYSIS-${ISSUE_ID}.md 자동 생성" \
                2>&1) || true

              if echo "$PR_URL" | grep -q "github.com"; then
                PR_NUM=$(echo "$PR_URL" | grep -oP '\d+$')
                gh pr merge "$PR_NUM" --merge --delete-branch 2>/dev/null || true

                # ANALYSIS 파일에서 항목 추출 → sub-이슈 자동 생성
                git checkout "$BRANCH" 2>/dev/null && git pull origin "$BRANCH" 2>/dev/null || true
                ANALYSIS_FILE="docs/ANALYSIS-${ISSUE_ID}.md"
                SUB_ITEMS=""
                SUB_COUNT=0
                if [ -f "$ANALYSIS_FILE" ]; then
                  # 번호 매겨진 항목 추출 (1. 2. 3. 또는 - [ ] 체크리스트)
                  SUB_ITEMS=$(grep -E '^\s*(([0-9]+\.|-))\s+' "$ANALYSIS_FILE" | grep -iE '수정|추가|제거|변경|개선|리팩토링|fix|add|remove|update|refactor' | head -10 || echo "")
                  SUB_COUNT=$(echo "$SUB_ITEMS" | grep -c . || echo 0)
                fi

                REPO_TAG=$(echo "${{ github.event.client_payload.task }}" | sed 's/\. 상세:.*$//')
                # 태그 없이 제목만 가져오기 위해 원본 이슈 제목에서 [repo:branch] 추출
                REPO_BRANCH_TAG="[$(echo "${{ github.repository }}" | cut -d/ -f2):${BRANCH}]"

                if [ "$SUB_COUNT" -gt 0 ]; then
                  # sub-이슈 생성
                  echo "📋 ANALYSIS에서 ${SUB_COUNT}개 항목 발견 — sub-이슈 생성"
                  SUB_LIST=""
                  IDX=1
                  echo "$SUB_ITEMS" | while IFS= read -r item; do
                    ITEM_CLEAN=$(echo "$item" | sed 's/^\s*[0-9]*[\.\)]\s*//' | sed 's/^\s*-\s*\[\s*\]\s*//' | sed 's/^\s*-\s*//' | head -c 100)
                    if [ -n "$ITEM_CLEAN" ]; then
                      SUB_TITLE="${REPO_BRANCH_TAG} ${ISSUE_ID} 항목${IDX}: ${ITEM_CLEAN}"
                      SUB_DESC="상위 이슈: ${ISSUE_ID}\n참조: ${ANALYSIS_FILE}\n\n${ITEM_CLEAN}"
                      SUB_DESC_JSON=$(echo -e "$SUB_DESC" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))" 2>/dev/null || echo "\"\"")

                      curl -sf -X POST "${PAPERCLIP_URL}/api/companies/${{ env.PAPERCLIP_COMPANY_ID || 'b80076db-214e-44a4-b016-427d7f0e3044' }}/issues" \
                        -H "Authorization: Bearer ${PAPERCLIP_API_KEY}" \
                        -H "Content-Type: application/json" \
                        -d "{\"title\":\"${SUB_TITLE}\",\"description\":${SUB_DESC_JSON},\"parentId\":\"${ISSUE_UUID}\",\"status\":\"todo\",\"priority\":\"medium\"}" > /dev/null 2>&1 || true

                      echo "  Sub-${IDX}: ${ITEM_CLEAN}"
                      IDX=$((IDX + 1))
                    fi
                  done

                  STATUS="done"
                  COMMENT="📊 분석 완료 — 자동 머지됨\n\n"
                  COMMENT="${COMMENT}🎉 PR 머지: ${PR_URL}\n\n"
                  COMMENT="${COMMENT}📋 ${SUB_COUNT}개 항목으로 분할하여 sub-이슈를 생성했습니다.\n"
                  COMMENT="${COMMENT}각 sub-이슈가 순차적으로 실행되며, 완료 시 승인을 요청합니다.\n\n"
                  COMMENT="${COMMENT}📂 분석 파일: ${ANALYSIS_FILE}"
                else
                  STATUS="done"
                  COMMENT="📊 분석 완료 — 자동 머지됨\n\n"
                  COMMENT="${COMMENT}🎉 PR 머지: ${PR_URL}\n\n"
                  COMMENT="${COMMENT}📂 분석 파일: ${ANALYSIS_FILE}\n\n"
                  COMMENT="${COMMENT}💡 항목 자동 추출 불가 — 분석 결과를 확인하고 후속 이슈를 생성해주세요."
                fi
              else
                STATUS="in_review"
                COMMENT="📊 분석 완료 — PR 생성 실패 (수동 확인 필요)\n\n🔗 Actions 로그: ${RUN_URL}"
              fi
            else
              # 코드 수정 작업
              # parent_id가 없고, 설명에 ANALYSIS 참조가 있으면 → sub-이슈 자동 분할
              DESC_TEXT=$(echo "$TASK" | sed 's/^.*\. 상세: //')
              ANALYSIS_REF=$(echo "$DESC_TEXT" | grep -oP 'docs/ANALYSIS-[A-Z]+-\d+\.md' | head -1 || echo "")
              HAS_PARENT="${{ github.event.client_payload.parent_id || '' }}"

              if [ -n "$ANALYSIS_REF" ] && [ -z "$HAS_PARENT" ] && [ -f "$ANALYSIS_REF" ]; then
                # ANALYSIS 파일에서 항목 추출
                SUB_ITEMS=$(grep -E '^\s*(([0-9]+\.|-))\s+' "$ANALYSIS_REF" | grep -iE '수정|추가|제거|변경|개선|리팩토링|fix|add|remove|update|refactor' | head -10 || echo "")
                SUB_COUNT=$(echo "$SUB_ITEMS" | grep -c . || echo 0)

                REPO_BRANCH_TAG="[$(echo "${{ github.repository }}" | cut -d/ -f2):${BRANCH}]"

                if [ "$SUB_COUNT" -gt 1 ]; then
                  # 항목 2개 이상 → sub-이슈 자동 생성 + 자동 머지 (현재 작업은 1개만 처리했으므로)
                  PR_URL=$(gh pr create \
                    --base "$BRANCH" \
                    --head "$WORK_BRANCH" \
                    --title "[${ISSUE_ID}] 코드 수정 (항목1)" \
                    --body "ANALYSIS 기반 순차 수정 - 항목 1" \
                    2>&1) || true

                  if echo "$PR_URL" | grep -q "github.com"; then
                    PR_NUM=$(echo "$PR_URL" | grep -oP '\d+$')
                    gh pr merge "$PR_NUM" --merge --delete-branch 2>/dev/null || true
                  fi

                  # 나머지 항목으로 sub-이슈 생성 (2번째부터)
                  echo "📋 ANALYSIS에서 ${SUB_COUNT}개 항목 발견 — 나머지 sub-이슈 생성"
                  IDX=1
                  echo "$SUB_ITEMS" | while IFS= read -r item; do
                    if [ "$IDX" -gt 1 ]; then
                      ITEM_CLEAN=$(echo "$item" | sed 's/^\s*[0-9]*[\.\)]\s*//' | sed 's/^\s*-\s*\[\s*\]\s*//' | sed 's/^\s*-\s*//' | head -c 100)
                      if [ -n "$ITEM_CLEAN" ]; then
                        SUB_TITLE="${REPO_BRANCH_TAG} ${ISSUE_ID} 항목${IDX}: ${ITEM_CLEAN}"
                        SUB_DESC="상위 이슈: ${ISSUE_ID}\n참조: ${ANALYSIS_REF}\n\n${ITEM_CLEAN}"
                        SUB_DESC_JSON=$(echo -e "$SUB_DESC" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))" 2>/dev/null || echo "\"\"")

                        curl -sf -X POST "${PAPERCLIP_URL}/api/companies/b80076db-214e-44a4-b016-427d7f0e3044/issues" \
                          -H "Authorization: Bearer ${PAPERCLIP_API_KEY}" \
                          -H "Content-Type: application/json" \
                          -d "{\"title\":\"${SUB_TITLE}\",\"description\":${SUB_DESC_JSON},\"parentId\":\"${ISSUE_UUID}\",\"status\":\"todo\",\"priority\":\"medium\"}" > /dev/null 2>&1 || true
                        echo "  Sub-${IDX}: ${ITEM_CLEAN}"
                      fi
                    fi
                    IDX=$((IDX + 1))
                  done

                  STATUS="done"
                  COMMENT="✅ 항목1 수정 완료 + 자동 머지\n\n"
                  COMMENT="${COMMENT}🎉 PR: ${PR_URL}\n\n"
                  COMMENT="${COMMENT}📋 나머지 $((SUB_COUNT - 1))개 항목을 sub-이슈로 생성했습니다.\n"
                  COMMENT="${COMMENT}각 sub-이슈가 순차적으로 실행됩니다."
                else
                  # 항목 1개 또는 추출 불가 → 기존 방식 (in_review, 승인 대기)
                  STATUS="in_review"
                  COMMENT="✅ 코드 수정 완료 — 리뷰 대기 중\n\n"
                  COMMENT="${COMMENT}📌 브랜치: \`${WORK_BRANCH}\` → \`${BRANCH}\`\n\n"
                  COMMENT="${COMMENT}📝 커밋:\n\`\`\`\n${COMMIT_LOG}\n\`\`\`\n\n"
                  COMMENT="${COMMENT}📂 변경 파일:\n\`\`\`\n${CHANGED_FILES}\n\`\`\`\n\n"
                  COMMENT="${COMMENT}🔗 Actions 로그: ${RUN_URL}\n\n"
                  COMMENT="${COMMENT}👉 반영하려면 이 이슈에 본문 내용 없이 '승인' 이라고만 코멘트를 남겨주세요."
                fi
              else
                # ANALYSIS 참조 없음 또는 sub-이슈 → 기존 방식 (in_review, 승인 대기)
                STATUS="in_review"
                COMMENT="✅ 코드 수정 완료 — 리뷰 대기 중\n\n"
                COMMENT="${COMMENT}📌 브랜치: \`${WORK_BRANCH}\` → \`${BRANCH}\`\n\n"
                COMMENT="${COMMENT}📝 커밋:\n\`\`\`\n${COMMIT_LOG}\n\`\`\`\n\n"
                COMMENT="${COMMENT}📂 변경 파일:\n\`\`\`\n${CHANGED_FILES}\n\`\`\`\n\n"
                COMMENT="${COMMENT}🔗 Actions 로그: ${RUN_URL}\n\n"
                COMMENT="${COMMENT}👉 반영하려면 이 이슈에 본문 내용 없이 '승인' 이라고만 코멘트를 남겨주세요."
              fi
            fi
          else
            STATUS="todo"
            COMMENT="❌ 작업 실패 — 재시도 필요\n\n🔗 Actions 로그: ${RUN_URL}"
          fi

          # 상태 업데이트
          curl -sf -X PATCH "${PAPERCLIP_URL}/api/issues/${ISSUE_UUID}" \
            -H "Authorization: Bearer ${PAPERCLIP_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"${STATUS}\"}" > /dev/null 2>&1 || true

          # 코멘트
          COMMENT_ESCAPED=$(echo -e "$COMMENT" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
          curl -sf -X POST "${PAPERCLIP_URL}/api/issues/${ISSUE_UUID}/comments" \
            -H "Authorization: Bearer ${PAPERCLIP_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"body\":${COMMENT_ESCAPED}}" > /dev/null 2>&1 || true

          echo "Paperclip ${ISSUE_ID}: ${STATUS} (분석: ${IS_ANALYSIS})"

  # ── 승인 → PR 생성 + 머지 (claude-approve) ──
  approve:
    if: github.event_name == 'repository_dispatch' && github.event.client_payload.action == 'approve'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.branch || 'main' }}
          fetch-depth: 0

      - name: PR 생성 및 머지
        env:
          PAPERCLIP_URL: https://paperclip-production-7ed4.up.railway.app
          PAPERCLIP_API_KEY: ${{ secrets.PAPERCLIP_API_KEY }}
          ISSUE_UUID: ${{ github.event.client_payload.issue_uuid }}
          ISSUE_ID: ${{ github.event.client_payload.issue_id }}
          ISSUE_TITLE: ${{ github.event.client_payload.issue_title }}
          BRANCH: ${{ github.event.client_payload.branch || 'main' }}
          GH_TOKEN: ${{ secrets.GLOBAL_SETTINGS_TOKEN }}
        run: |
          WORK_BRANCH="claude/${ISSUE_ID}"

          # PR 생성
          PR_URL=$(gh pr create \
            --base "$BRANCH" \
            --head "$WORK_BRANCH" \
            --title "[${ISSUE_ID}] ${ISSUE_TITLE}" \
            --body "Paperclip 이슈 ${ISSUE_ID} 승인됨. 자동 생성된 PR." \
            2>&1) || true

          if echo "$PR_URL" | grep -q "github.com"; then
            echo "PR 생성됨: $PR_URL"

            # PR 자동 머지
            PR_NUM=$(echo "$PR_URL" | grep -oP '\d+$')
            gh pr merge "$PR_NUM" --merge --delete-branch || true

            # Paperclip → done
            curl -sf -X PATCH "${PAPERCLIP_URL}/api/issues/${ISSUE_UUID}" \
              -H "Authorization: Bearer ${PAPERCLIP_API_KEY}" \
              -H "Content-Type: application/json" \
              -d '{"status":"done"}' > /dev/null 2>&1 || true

            curl -sf -X POST "${PAPERCLIP_URL}/api/issues/${ISSUE_UUID}/comments" \
              -H "Authorization: Bearer ${PAPERCLIP_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"body\":\"🎉 PR 머지 완료: ${PR_URL}\"}" > /dev/null 2>&1 || true

            echo "✅ PR 머지 + Paperclip done"
          else
            echo "⚠️ PR 생성 실패: $PR_URL"

            curl -sf -X POST "${PAPERCLIP_URL}/api/issues/${ISSUE_UUID}/comments" \
              -H "Authorization: Bearer ${PAPERCLIP_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"body\":\"⚠️ PR 생성 실패 — 브랜치 ${WORK_BRANCH} 확인 필요\"}" > /dev/null 2>&1 || true
          fi
