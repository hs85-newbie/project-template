name: Claude Code (수동 실행)

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Claude에게 시킬 작업"
        required: true
        type: string
      max_turns:
        description: "최대 실행 횟수 (기본: 20)"
        default: "20"
        type: string
  repository_dispatch:
    types: [claude-task]

jobs:
  claude:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: hs85-newbie/my-claude-global
          path: .claude-global
          token: ${{ secrets.GLOBAL_SETTINGS_TOKEN }}
      - run: |
          mkdir -p ~/.claude/skills
          cp .claude-global/CLAUDE.md ~/.claude/CLAUDE.md
          cp -r .claude-global/skills/* ~/.claude/skills/ 2>/dev/null || true
      - name: Bun 설치
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/gstack
          key: gstack-v1-${{ runner.os }}
      - name: gstack 설치 (캐시 미스 시)
        run: |
          if [ ! -f ~/gstack/setup ]; then
            git clone https://github.com/garrytan/gstack.git ~/gstack
          fi
          cd ~/gstack && ./setup --host claude
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ inputs.task || github.event.client_payload.task }}
          claude_args: "--max-turns ${{ inputs.max_turns || github.event.client_payload.max_turns || '20' }}"
